<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liên hệ Vũ Nguyễn</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:340px;
    background:#fff;
    border-radius:25px;
    text-align:center;
    padding:30px;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.avatar{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid #2196F3;
    margin-bottom:15px;
}

h2{
    color:#333;
}

p{
    color:#666;
    margin-bottom:25px;
}

.btn{
    display:block;
    width:100%;
    text-decoration:none;
    color:white;
    padding:15px;
    border-radius:12px;
    margin:12px 0;
    font-size:20px;
    font-weight:bold;
    transition:.3s;
}

.fb{
    background:#1877F2;
}

.zalo{
    background:#0084FF;
}

.btn:hover{
    transform:scale(1.05);
}

.footer{
    margin-top:20px;
    color:#999;
    font-size:13px;
}
</style>

</head>

<body>

<div class="card">

<img src="avatar.jpg" class="avatar">

<h2>Vũ Nguyễn</h2>

<p>Xin chào 👋<br>Chọn kênh liên hệ bên dưới</p>

<a class="btn fb"
href="https://www.facebook.com/khocnhe.hoahong"
target="_blank">
📘 Facebook
</a>

<a class="btn zalo"
href="https://zalo.me/0396134347"
target="_blank">
💬 Zalo
</a>

<div class="footer">
Hoạt động 24/7
</div>

</div>

</body>
</html>
